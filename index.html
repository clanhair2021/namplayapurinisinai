<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美容室CLanからの挑戦状</title>
    <!-- CSSファイルの読み込み -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========================================================
         メニュー画面
         ======================================================== -->
    <div id="menu-screen" class="screen-container">
        <!-- 右上の設定ボタン -->
        <button class="btn-settings" onclick="openSettingsModal()">⚙</button>
        
        <!-- センター上部のタイトル -->
        <h1 class="menu-title">美容室CLan<br>からの挑戦状</h1>
        
        <!-- 難易度ボタン（縦に4つ） -->
        <div class="menu-difficulty-list">
            <button class="btn-menu" onclick="handleMenuGenerate('easy')">初級</button>
            <button class="btn-menu" onclick="handleMenuGenerate('normal')">中級</button>
            <button class="btn-menu" onclick="handleMenuGenerate('hard')">上級</button>
            <button class="btn-menu" onclick="handleMenuGenerate('expert')">最高級</button>
        </div>
        
        <!-- 保存データから探すボタン -->
        <button class="btn-menu-load-trigger" onclick="openLoadModal()">保存したステージから読込</button>
    </div>

    <!-- ========================================================
         ゲーム画面（新ステータスバー搭載）
         ======================================================== -->
    <div id="game-screen" class="screen-container" style="display: none;">
        <!-- ゲーム画面側の設定ボタン -->
        <button class="btn-settings" onclick="openSettingsModal()">⚙</button>
        
        <!-- リアルタイムステータスバー（競技用競技パズル仕様） -->
        <div class="status-bar">
            <div class="status-row-top">
                <span id="status-difficulty" class="badge">中級</span>
                <span id="status-timer">⏱ 00:00</span>
                <span id="status-score">SCORE: 0</span>
            </div>
            <div class="status-row-bottom">
                <span id="status-miss">ミス: 0</span>
                <span id="status-combo">0 COMBO</span>
            </div>
        </div>

        <!-- 盤面 -->
        <div class="grid-wrapper">
            <div class="grid" id="sudoku-grid"></div>
            <div class="pause-overlay" id="pause-screen">
                <div class="pause-title">PAUSED</div>
                <button class="btn-resume" onclick="resumeGame()">RESUME</button>
            </div>
        </div>

        <div class="error-message" id="error-text"></div>

        <!-- キーパッド（左右並び・1〜9のみの3x3構造） -->
        <div class="keypad-container" id="num-pad-area">
            <!-- 左側：メモキー -->
            <div class="memo-pad">
                <div class="pad-title">MEMO</div>
                <button class="btn-memo-num" onclick="pressMemoNumber(1)">1</button>
                <button class="btn-memo-num" onclick="pressMemoNumber(2)">2</button>
                <button class="btn-memo-num" onclick="pressMemoNumber(3)">3</button>
                <button class="btn-memo-num" onclick="pressMemoNumber(4)">4</button>
                <button class="btn-memo-num" onclick="pressMemoNumber(5)">5</button>
                <button class="btn-memo-num" onclick="pressMemoNumber(6)">6</button>
                <button class="btn-memo-num" onclick="pressMemoNumber(7)">7</button>
                <button class="btn-memo-num" onclick="pressMemoNumber(8)">8</button>
                <button class="btn-memo-num" onclick="pressMemoNumber(9)">9</button>
            </div>

            <!-- 右側：テンキー -->
            <div class="main-pad">
                <div class="pad-title">INPUT</div>
                <button class="num-btn" id="btn-num-1" onclick="pressMainNumber(1)">1<span class="num-count" id="count-1">0/9</span></button>
                <button class="num-btn" id="btn-num-2" onclick="pressMainNumber(2)">2<span class="num-count" id="count-2">0/9</span></button>
                <button class="num-btn" id="btn-num-3" onclick="pressMainNumber(3)">3<span class="num-count" id="count-3">0/9</span></button>
                <button class="num-btn" id="btn-num-4" onclick="pressMainNumber(4)">4<span class="num-count" id="count-4">0/9</span></button>
                <button class="num-btn" id="btn-num-5" onclick="pressMainNumber(5)">5<span class="num-count" id="count-5">0/9</span></button>
                <button class="num-btn" id="btn-num-6" onclick="pressMainNumber(6)">6<span class="num-count" id="count-6">0/9</span></button>
                <button class="num-btn" id="btn-num-7" onclick="pressMainNumber(7)">7<span class="num-count" id="count-7">0/9</span></button>
                <button class="num-btn" id="btn-num-8" onclick="pressMainNumber(8)">8<span class="num-count" id="count-8">0/9</span></button>
                <button class="num-btn" id="btn-num-9" onclick="pressMainNumber(9)">9<span class="num-count" id="count-9">0/9</span></button>
            </div>
        </div>
    </div>

    <!-- ========================================================
         設定モーダル
         ======================================================== -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-title">SETTINGS</div>

            <!-- 2パターンの正誤判定モード切り替え -->
            <div class="setting-item">
                <div class="setting-label">正誤判定モード</div>
                <div class="mode-select-buttons">
                    <button id="btn-mode-classic" class="btn-setting-action active" onclick="setJudgeMode('classic')">最後まで秘密</button>
                    <button id="btn-mode-instant" class="btn-setting-action" onclick="setJudgeMode('instant')">1手ごとに即判定</button>
                </div>
            </div>

            <!-- テーマカラー選択（モック枠・機能なし） -->
            <div class="setting-item">
                <div class="setting-label">テーマカラー（準備中）</div>
                <div class="color-slots">
                    <span class="color-dot active" style="background: #0066cc;"></span>
                    <span class="color-dot" style="background: #22c55e;"></span>
                    <span class="color-dot" style="background: #ef4444;"></span>
                    <span class="color-dot" style="background: #a855f7;"></span>
                </div>
            </div>

            <!-- ゲーム中のみ表示されるアクションエリア -->
            <div id="game-actions-area" style="display: none; border-top: 1px solid var(--border); margin-top: 15px; padding-top: 15px; flex-direction: column; gap: 8px;">
                <button class="btn-setting-action" style="border-color: var(--primary); color: var(--primary);" onclick="triggerSave()">この問題を保存する</button>
                <button class="btn-setting-action" onclick="triggerReset()">最初から解き直す</button>
                <button class="btn-setting-action" style="border-color: var(--error); color: var(--error);" onclick="triggerQuit()">ギブアップ</button>
            </div>

            <button class="btn-modal-close" onclick="closeSettingsModal()">閉じる</button>
        </div>
    </div>

    <!-- 読込用モーダル -->
    <div class="modal-overlay" id="load-modal">
        <div class="modal-content">
            <div class="modal-title">SAVE DATA</div>
            <div class="save-list" id="modal-save-list"></div>
            <button class="btn-modal-close secondary" onclick="closeLoadModal()">閉じる</button>
        </div>
    </div>

    <!-- クリア画面（スコアリザルト内訳表示用） -->
    <div class="clear-overlay" id="clear-screen">
        <div class="clear-content">
            <div class="clear-title">CLEAR!</div>
            <div class="clear-msg">
                <!-- ここにJSでスコアの内訳が綺麗に挿入されます -->
            </div>
            <button class="clear-btn-close" onclick="closeClearScreen()">CLOSE</button>
        </div>
    </div>

    <!-- JavaScriptファイルの読み込み -->
    <script src="script.js"></script>
</body>
</html>
